name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Aceptar licencias Android
        run: |
          yes | flutter doctor --android-licenses 2>&1 || true
          flutter doctor -v 2>&1 || true

      - name: Instalar dependencias Python
        run: |
          pip install flet yt-dlp requests

      - name: Compilar APK con flet build
        run: |
          flet build android \
            --project "AudioReader Pro" \
            --org com.tudominio \
            --bundle-id com.tudominio.audioreaderpro \
            --verbose \
            2>&1
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Mostrar resultado (siempre)
        if: always()
        run: |
          echo "=== APKs encontrados ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK"
          echo "=== Logs de build ==="
          find . -name "*.log" 2>/dev/null | head -5
          cat build/android/*.log 2>/dev/null | tail -80 || true

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: AudioReaderPro-APK
          path: "**/*.apk"
          retention-days: 7
